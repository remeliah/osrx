services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - API_PORT=${API_PORT:-3001}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      - PORT=${WEB_PORT:-3000}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-9082}:80"
    environment:
      - API_PORT=${API_PORT:-3001}
      - WEB_PORT=${WEB_PORT:-3000}
    volumes:
      - ./ext/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

